<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="./todo.css">
</head>
<body>

<div class="container">
    <h2>Todo List</h2>

    <div class="input-section">
        <input type="text" id="todoInput" placeholder="Enter task">
        <button id="addBtn" onClick="addTodo()">Add</button>
        <button id="deleteAll-Btn" onClick="deleteAll()">Delete All</button>
        <button id="updateBtn" onClick="updateTodo()" style="display:none;">Update</button>
    </div>

    <ul id="todoList"></ul>
</div>

<script src="./main.js">
</script>
</body>
</html>
